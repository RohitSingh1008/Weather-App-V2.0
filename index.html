.message {
    position: fixed;
    width: 100%;
    max-width: 350px;
    margin: 0 auto;
    padding: 10px 20px;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    font-size: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 9999;
    visibility: hidden; /* Default hidden */
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    transition: visibility 0.3s ease, transform 0.5s ease;
}

/* Close Button (SVG) */
.message svg {
    cursor: pointer;
    fill: white;
    margin-left: 15px;
    width: 20px;
    height: 20px;
}

/* Offline Message (Red, Bottom Left to Right) */
.message.offline {
    bottom: 20px; /* Positioned at bottom */
    left: -100%; /* Start off-screen on the left */
    background-color: #f44336; /* Red color */
    animation: slideLeftToRight 1s ease-out, rubberIn 0.5s ease-out 1s;
}

/* Online Message (Green, Top Right to Left) */
.message.online {
    top: 20px; /* Positioned at top */
    right: -100%; /* Start off-screen on the right */
    background-color: #4CAF50; /* Green color */
    animation: slideRightToLeft 1s ease-out, rubberIn 0.5s ease-out 1s;
}

/* Keyframe Animations */
@keyframes rubberIn {
    0% {
        transform: scaleX(0.5);
    }
    25% {
        transform: scaleX(1.1);
    }
    50% {
        transform: scaleX(1.0);
    }
    75% {
        transform: scaleX(1.1);
    }
    100% {
        transform: scaleX(1);
    }
}

@keyframes slideLeftToRight {
    0% {
        transform: translateX(-100%); /* Start off-screen to the left */
    }
    100% {
        transform: translateX(0); /* Slide into the screen */
    }
}

@keyframes slideRightToLeft {
    0% {
        transform: translateX(100%); /* Start off-screen to the right */
    }
    100% {
        transform: translateX(0); /* Slide into the screen */
    }
}

/* Close notification on click */
.message.hide {
    visibility: hidden;
    transform: translateX(100%); /* Hide off-screen */
}

function toTime(ts, tzOffset) {
  const d = new Date((ts + (tzOffset || 0)) * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function toFahrenheit(c) { return (c * 9 / 5) + 32; }
function smoothUpdate(el, newValue, unit = '') {
  const start = parseFloat(el.innerText) || 0;
  const diff = newValue - start;
  let progress = 0;
  const duration = 700;
  const step = 16;
  function animate() {
    progress += step;
    const val = start + diff * Math.min(progress / duration, 1);
    el.innerText = val.toFixed(1) + (unit ? ' ' + unit : '');
    if (progress < duration) requestAnimationFrame(animate);
  }
  animate();
}
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1; u.pitch = 1; u.lang = 'hi-IN';
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

/* === function to play sound dynamically === */
function playWeatherSound(condition) {
  // stop any currently playing sound
  Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });

  condition = condition.toLowerCase();

  if (condition.includes('thunder')) sounds.thunder.play();
  else if (condition.includes('storm')) sounds.storm.play();
  else if (condition.includes('rain')) sounds.rain.play();
  else if (condition.includes('drizzle')) sounds.drizzle.play();
  else if (condition.includes('snow')) sounds.snow.play();
  else if (condition.includes('wind')) sounds.wind.play();
  else if (condition.includes('cloud')) sounds.cloudy.play();
  else if (condition.includes('fog')) sounds.fog.play();
  else if (condition.includes('haze')) sounds.haze.play();
  else if (condition.includes('mist')) sounds.mist.play();
  else if (condition.includes('clear')) sounds.clear.play();
  else if (condition.includes('sun') || condition.includes('bright')) sounds.sunny.play();
  else sounds.cloudy.play(); // default fallback
}

/* =============== MAIN RENDER ================= */
async function renderWeather(data, isCurrent=false, isSearch=false) {
  currentWeather = data;
  const countryCode = data.sys?.country || "IN";
  const countryName = countryNames[countryCode] || countryCode;

  const temp = showCelsius ? data.main.temp : toFahrenheit(data.main.temp);
  const tempUnit = showCelsius ? "°C" : "°F";
  const feelsUnit = showCelsius ? "°C" : "°F";

  cityCaption.innerText = `${data.name}, ${countryName}`;
  countryFlag.src = `https://flagsapi.com/${countryCode}/shiny/32.png`;
  weatherIcon.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;
  descEl.innerText = data.weather[0].description;

  smoothUpdate(tempSpan, temp, tempUnit);
  smoothUpdate(cloudsEl, data.clouds.all, "%");
  smoothUpdate(humidityEl, data.main.humidity, "%");
  smoothUpdate(pressureEl, data.main.pressure, "hPa");
  smoothUpdate(windEl, data.wind.speed, "m/s (" + (data.wind.deg || 0) + "°)");
  smoothUpdate(feelsLikeEl, data.main.feels_like, feelsUnit);
  visibilityEl.innerText = (data.visibility / 1000).toFixed(1) + " km";
  rainEl.innerText = (data.rain ? (data.rain['1h'] || 0) : 0) + " mm";
    sunriseEl.innerText = toTime(data.sys.sunrise).replace(/am|pm/i, m => m.toUpperCase());  // India time, AM/PM uppercase
    sunsetEl.innerText = toTime(data.sys.sunset).replace(/am|pm/i, m => m.toUpperCase());  // India time, AM/PM uppercase
   // Local Time (live update)
function updateLocalTime() {
  const now = new Date();
  localTimeEl.innerText = now.toLocaleTimeString('en-IN', {
    hour: '2-digit',
    minute: '2-digit',
   
    hour12: true
  }).replace(/am|pm/i, m => m.toUpperCase());
}

// Pehle ek bar update karo
updateLocalTime();

// Phir har 1 second me update karo
setInterval(updateLocalTime, 1000);


  // AQI fetch + text mapping
  const aqi = await fetchAirQuality(data.coord.lat, data.coord.lon);
  const aqiText = interpretAQI(aqi);
  aqiEl.innerText = `${aqi} (${aqiText})`;

  // Weather sound + voice
  playWeatherSound(data.weather[0].description);
  if (isCurrent) speak(`Your current location is ${data.name}, ${countryName}`);
  else if (isSearch) speak(`आपके द्वारा सर्च किया गया लोकेशन  ${data.name} hai, जो ${countryName} देश में hai`);
}

/* =============== FETCH ================= */
async function fetchWeatherByCity(q) {
  try {
    speak("" + q);// "Fetching weather for" dalsakte hia 
    const res = await fetch(baseUrl + '&q=' + encodeURIComponent(q));
    const data = await res.json();
    if (data.cod != 200) return speak("माफ़ कीजिए, आपके द्वारा सर्च किया गया लोकेशन नहीं मिल सका, कृपया सही नाम के साथ दोबारा सर्च करे।");
    renderWeather(data, false, true);
  } catch (e) { console.error(e); }
}
async function fetchWeatherByCoords(lat, lon) {
  try {
    speak("");//"Updating your location, please wait" ye bhi dal sakte hia optional hai...
    const res = await fetch(baseUrl + '&lat=' + lat + '&lon=' + lon);
    const data = await res.json();
    if (data.cod != 200) return;
    renderWeather(data, true, false);
  } catch (e) { console.error(e); }
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const q = input.value.trim();
  if (q) fetchWeatherByCity(q);
  input.value = '';
});
searchBtn.addEventListener('click', e => {
  e.preventDefault();

if (toggleTemp) {
  toggleTemp.addEventListener('click', () => {
    showCelsius = !showCelsius;
    if (currentWeather) renderWeather(currentWeather);
    toggleTemp.innerText = showCelsius ? 'Show °F' : 'Show °C';
  });
}

window.addEventListener('load', () => {

<script>
// ===== Auto Scroll + Manual Control =====
const scrollContainer = document.getElementById("weatherScroll");
let scrollAmount = 1; // speed
let scrollDirection = 1; // 1 = right, -1 = left
let isUserInteracting = false; // pause on user scroll

function autoScroll() {
  if (!isUserInteracting) {
    scrollContainer.scrollLeft += scrollAmount * scrollDirection;
    if (scrollContainer.scrollLeft + scrollContainer.clientWidth >= scrollContainer.scrollWidth) {
      scrollDirection = -1;
    } else if (scrollContainer.scrollLeft <= 0) {
      scrollDirection = 1;
    }
  }
  requestAnimationFrame(autoScroll);
}

// Pause auto-scroll while user interacts
scrollContainer.addEventListener("mousedown", () => (isUserInteracting = true));
scrollContainer.addEventListener("touchstart", () => (isUserInteracting = true));
scrollContainer.addEventListener("mouseup", () => (isUserInteracting = false));
scrollContainer.addEventListener("touchend", () => (isUserInteracting = false));
scrollContainer.addEventListener("wheel", () => {
  isUserInteracting = true;
  clearTimeout(scrollContainer._wheelTimeout);
  scrollContainer._wheelTimeout = setTimeout(() => (isUserInteracting = false), 1500);
});

window.addEventListener("load", () => requestAnimationFrame(autoScroll));
</script>
